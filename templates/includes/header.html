{% load static %}
<header class="site-header">
    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container header-container">
            <a class="navbar-brand" href="{% url 'core:home' %}">
                <div class="navbar-logo-container">
                    <img src="{% if site_configuration.logo %}{{ site_configuration.logo.url }}{% else %}{% static 'img/logo.png' %}{% endif %}"
                         alt="Sindicato AZA"
                         loading="lazy"
                         onerror="this.style.display='none'">
                </div>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Abrir navegacion">
                <i class="bi bi-list fs-3"></i>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:home' %}">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'comunicados:list' %}">Comunicados</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'documentos:list' %}">Documentos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'beneficios:list' %}">Beneficios</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:home' %}#quienes-somos">¿Quiénes somos?</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'core:home' %}#directiva">Directiva</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'contacto:index' %}">Contacto</a>
                    </li>
                    {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'capacitacion:list' %}">Centro de Ayuda</a>
                    </li>
                    {% endif %}
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-primary btn-sm px-4 rounded-pill" href="{% url 'contacto:index' %}">Contactar</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
</header>
