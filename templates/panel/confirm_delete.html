{% extends "panel/base_panel.html" %}
{% block title %}Eliminar — {{ nombre }}{% endblock %}

{% block content %}
<div style="max-width:560px;margin:0 auto;">
    <div class="p-card" style="border-top:4px solid #C62828;">
        <div class="p-card-body" style="text-align:center;padding:2.5rem 2rem;">
            <i class="bi bi-exclamation-triangle-fill" style="font-size:3rem;color:#C62828;display:block;margin-bottom:1rem;"></i>
            <h2 style="font-family:'Montserrat',sans-serif;font-weight:800;font-size:1.4rem;margin-bottom:0.5rem;">
                Confirmar eliminacion
            </h2>
            <p style="color:#546E7A;font-size:1rem;margin-bottom:0.25rem;">
                Esta a punto de eliminar el siguiente registro de <strong>{{ seccion }}</strong>:
            </p>
            <div style="background:#FFF3F3;border:1px solid #FFCDD2;border-radius:9px;padding:1rem 1.25rem;margin:1.25rem 0;font-weight:700;font-size:1.05rem;color:#263238;">
                "{{ nombre }}"
            </div>
            <p style="color:#C62828;font-size:0.9rem;margin-bottom:1.75rem;">
                <i class="bi bi-exclamation-circle me-1"></i>
                Esta accion no se puede deshacer.
            </p>
            <form method="post">
                {% csrf_token %}
                <div style="display:flex;gap:0.75rem;justify-content:center;flex-wrap:wrap;">
                    <button type="submit" class="btn-p-rojo">
                        <i class="bi bi-trash3"></i>Si, eliminar
                    </button>
                    <a href="{% url cancelar_url %}" class="btn-p-gris">
                        <i class="bi bi-arrow-left"></i>No, volver
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
