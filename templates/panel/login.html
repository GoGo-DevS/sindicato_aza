<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Acceso al Panel — Sindicato AZA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #1565C0 0%, #2E7D32 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.22);
            width: 100%;
            max-width: 440px;
            overflow: hidden;
        }

        /* Franja superior */
        .login-top {
            background: linear-gradient(135deg, #1565C0 0%, #2E7D32 100%);
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .login-logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.25rem;
        }

        .login-logo-img {
            width: 72px;
            height: 72px;
            object-fit: contain;
            border-radius: 14px;
            padding: 8px;
            background: rgba(255,255,255,0.15);
            border: 2px solid rgba(255,255,255,0.30);
            filter: brightness(0) invert(1);
        }

        .login-logo-text {
            text-align: left;
        }
        .login-logo-top {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.78);
        }
        .login-logo-main {
            font-family: 'Montserrat', sans-serif;
            font-size: 2.2rem;
            font-weight: 800;
            color: #ffffff;
            line-height: 1;
            letter-spacing: 0.03em;
        }

        .login-subtitle {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.88rem;
            color: rgba(255,255,255,0.78);
            letter-spacing: 0.04em;
        }

        /* Cuerpo del formulario */
        .login-body {
            padding: 2rem 2rem 2.5rem;
        }

        .login-title {
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.25rem;
            color: #263238;
            text-align: center;
            margin-bottom: 0.35rem;
        }
        .login-hint {
            text-align: center;
            color: #78909C;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }

        /* Error */
        .login-error {
            background: #FFEBEE;
            border-left: 4px solid #C62828;
            border-radius: 9px;
            padding: 0.9rem 1.1rem;
            color: #B71C1C;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
        }

        /* Campos */
        .campo-label {
            display: block;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 0.95rem;
            color: #263238;
            margin-bottom: 0.4rem;
        }

        .campo-input {
            width: 100%;
            border: 2px solid #B0BEC5;
            border-radius: 10px;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            font-size: 1rem;
            font-family: 'Open Sans', sans-serif;
            color: #263238;
            background: #F8FAFC;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .campo-input:focus {
            border-color: #2E7D32;
            box-shadow: 0 0 0 3px rgba(46,125,50,0.14);
            background: #fff;
        }

        .campo-wrap {
            position: relative;
            margin-bottom: 1.35rem;
        }
        .campo-icon {
            position: absolute;
            left: 0.95rem;
            top: 50%;
            transform: translateY(-50%);
            color: #90A4AE;
            font-size: 1.05rem;
            pointer-events: none;
        }

        /* Boton */
        .btn-login {
            width: 100%;
            padding: 0.95rem;
            background: #2E7D32;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.05rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .btn-login:hover { background: #1B5E20; }
        .btn-login:active { transform: scale(0.99); }
    </style>
</head>
<body>

<div class="login-card">

    <!-- Franja superior con logo -->
    <div class="login-top">
        <div class="login-logo-wrap">
            {% if site_config.logo %}
                <img src="{{ site_config.logo.url }}"
                     alt="Sindicato AZA"
                     class="login-logo-img"
                     onerror="this.style.display='none'">
            {% endif %}
            <div class="login-logo-text">
                <div class="login-logo-top">Sindicato Unificado</div>
                <div class="login-logo-main">AZA</div>
            </div>
        </div>
        <div class="login-subtitle">Portal de administracion</div>
    </div>

    <!-- Formulario -->
    <div class="login-body">
        <h1 class="login-title">Iniciar sesion</h1>
        <p class="login-hint">Ingrese sus datos para acceder al panel</p>

        {% if error %}
            <div class="login-error">
                <i class="bi bi-exclamation-circle-fill" style="flex-shrink:0;margin-top:1px;"></i>
                {{ error }}
            </div>
        {% endif %}

        <form method="post" novalidate>
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next }}">

            <!-- Usuario -->
            <div>
                <label class="campo-label" for="id_username">Usuario</label>
                <div class="campo-wrap">
                    <i class="bi bi-person campo-icon"></i>
                    <input
                        type="text"
                        name="username"
                        id="id_username"
                        class="campo-input"
                        placeholder="Nombre de usuario"
                        autocomplete="username"
                        autofocus
                        required>
                </div>
            </div>

            <!-- Contrasena -->
            <div>
                <label class="campo-label" for="id_password">Contrasena</label>
                <div class="campo-wrap">
                    <i class="bi bi-lock campo-icon"></i>
                    <input
                        type="password"
                        name="password"
                        id="id_password"
                        class="campo-input"
                        placeholder="Ingrese su contrasena"
                        autocomplete="current-password"
                        required>
                </div>
            </div>

            <button type="submit" class="btn-login">
                <i class="bi bi-box-arrow-in-right"></i>
                Ingresar al panel
            </button>
        </form>
    </div>
</div>

</body>
</html>
